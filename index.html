<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Minecraft Log Viewer PRO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1f2937;
  --border:     #30363d;
  --accent:     #58a6ff;
  --accent-dim: rgba(88,166,255,0.12);
  --text:       #e6edf3;
  --muted:      #8b949e;
  --green:      #3fb950;
  --yellow:     #d29922;
  --red:        #f85149;
}

body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

.app { max-width: 1200px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 14px; }

/* header */
header { display: flex; align-items: center; gap: 10px; }
header h1 { font-size: 20px; font-weight: 600; letter-spacing: -.3px; }
.badge {
  background: var(--accent-dim); color: var(--accent);
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; border: 1px solid rgba(88,166,255,.3);
  letter-spacing: .5px; text-transform: uppercase;
}

/* drop zone */
.drop-zone {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 24px 20px; text-align: center; cursor: pointer;
  transition: border-color .15s, background .15s;
  background: var(--surface); position: relative;
}
.drop-zone:hover, .drop-zone.over { border-color: var(--accent); background: var(--accent-dim); }
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-icon { font-size: 28px; margin-bottom: 6px; }
.drop-label { font-size: 13px; color: var(--muted); line-height: 1.7; }
.drop-label strong { color: var(--text); }
kbd { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 11px; color: var(--accent); }

/* progress */
.progress-wrap { display: none; flex-direction: column; gap: 6px; }
.progress-wrap.on { display: flex; }
.progress-label { font-size: 12px; color: var(--muted); }
.progress-bg { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; width: 0%; transition: width .1s; }

/* stats bar */
.stats-bar { display: none; gap: 16px; flex-wrap: wrap; padding: 10px 14px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); font-size: 12px; align-items: center; }
.stat { display: flex; align-items: center; gap: 5px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.stat-val { font-weight: 600; }
.stat-lbl { color: var(--muted); }

/* controls */
.controls { display: flex; gap: 8px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 220px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
input[type=text] { width: 100%; height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0 10px 0 34px; outline: none; transition: border-color .15s; }
input[type=text]:focus { border-color: var(--accent); }
select { height: 36px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; padding: 0 10px; outline: none; cursor: pointer; }
select:focus { border-color: var(--accent); }
.btn { height: 36px; padding: 0 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; transition: background .15s, border-color .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.btn:hover { background: var(--surface2); border-color: rgba(88,166,255,.4); }
.btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
.btn.primary:hover { background: #2ea043; }
.btn.active-btn { border-color: var(--accent) !important; color: var(--accent) !important; }

/* file tabs */
.file-tabs { display: none; gap: 4px; flex-wrap: wrap; max-height: 72px; overflow-y: auto; }
.ftab { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .1s; white-space: nowrap; }
.ftab:hover, .ftab.on { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.ftab.all-tab { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.1); }
.ftab.all-tab.on { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.2); }

/* detail panel */
.detail-panel { display: none; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 10px 14px; position: relative; max-height: 180px; overflow-y: auto; }
.detail-panel.on { display: block; }
.detail-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 10px; color: var(--muted); }
.detail-file { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.detail-close { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; line-height: 1; padding: 0; }
.detail-close:hover { color: var(--text); }
.detail-copy { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-size: 10px; padding: 2px 8px; cursor: pointer; }
.detail-copy:hover { color: var(--text); border-color: var(--accent); }
.detail-body { font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 12px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; color: var(--text); }

/* viewport */
.viewport-wrap { background: #010409; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
.viewport { height: 560px; overflow-y: scroll; overflow-x: auto; padding: 4px 0; scroll-behavior: auto; }
.viewport::-webkit-scrollbar { width: 7px; height: 7px; }
.viewport::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
.viewport::-webkit-scrollbar-track { background: transparent; }

/* lines — height MUST equal JS constant LH = 22 */
.line { height: 22px; display: flex; align-items: center; gap: 8px; padding: 0 8px; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 12px; white-space: pre; cursor: pointer; flex-shrink: 0; border-radius: 3px; }
.line:hover { background: #1a2030; }
.line-num  { color: #3d4a5c; font-size: 10px; min-width: 52px; text-align: right; user-select: none; flex-shrink: 0; }
.line-file { color: #3c5a7a; font-size: 10px; min-width: 140px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; user-select: none; }
.line-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.line-text mark { background: rgba(255,210,0,.35); color: inherit; border-radius: 2px; padding: 0 1px; }
.sev-ERROR { background: rgba(248,81,73,.06); }
.sev-WARN  { background: rgba(210,153,34,.06); }
.sev-ERROR .line-text { color: #ff8585; }
.sev-WARN  .line-text { color: #e3b341; }

/* wrap mode */
.vp-wrap .line      { height: auto !important; min-height: 22px; align-items: flex-start; padding-top: 3px; padding-bottom: 3px; white-space: normal; }
.vp-wrap .line-text { white-space: pre-wrap; overflow: visible; text-overflow: unset; word-break: break-all; }

/* empty state */
.empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); font-size: 14px; padding: 40px; min-height: 200px; }
.empty-icon { font-size: 38px; }

/* result bar */
.result-bar { font-size: 11px; color: var(--muted); padding: 4px 10px; background: var(--surface); border-top: 1px solid var(--border); }

/* toast */
#toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #238636; color: #fff; font-size: 13px; font-weight: 500; padding: 9px 18px; border-radius: 8px; z-index: 9999; display: none; align-items: center; gap: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); white-space: nowrap; }
#toast.on { display: flex; }
@keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
#toast.on { animation: fadeUp .2s ease; }
</style>
</head>
<body>
<div class="app">

  <header>
    <span style="font-size:24px">📜</span>
    <h1>Minecraft Log Viewer</h1>
    <span class="badge">PRO</span>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple accept=".log,.txt,.gz">
    <div class="drop-icon">📁</div>
    <div class="drop-label">
      <strong>Arrastra aquí</strong> tus logs, haz clic o pega con <kbd>Ctrl+V</kbd><br>
      <span style="font-size:11px">Soporta .log · .txt · .gz · 140+ archivos a la vez</span>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Cargando...</div>
    <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-val" id="sFiles">0</span><span class="stat-lbl">archivos</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--accent)"></div><span class="stat-val" id="sLines">0</span><span class="stat-lbl">líneas</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--red)"></div><span class="stat-val" id="sErrors">0</span><span class="stat-lbl">errores</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--yellow)"></div><span class="stat-val" id="sWarns">0</span><span class="stat-lbl">advertencias</span></div>
    <div style="margin-left:auto"><button class="btn" onclick="exportResults()">⬇ Exportar</button></div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Buscar texto, jugadores, IPs, errores...">
    </div>
    <select id="sevSel">
      <option value="">Todos los niveles</option>
      <option value="ERROR">ERROR</option>
      <option value="WARN">WARN</option>
      <option value="INFO">INFO</option>
    </select>
    <button class="btn primary" onclick="applyFilter()">Filtrar</button>
    <button class="btn" onclick="resetFilter()">Limpiar</button>
    <button class="btn" id="btnWrap" onclick="toggleWrap()">↩ Ajustar texto</button>
  </div>

  <div class="file-tabs" id="fileTabs"></div>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-hdr">
      <span class="detail-file" id="detailFile"></span>
      <button class="detail-copy" id="detailCopyBtn" onclick="copyDetail()">Copiar</button>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <div class="viewport-wrap">
    <div class="viewport" id="viewport">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <span>Carga tus archivos de log para comenzar</span>
      </div>
    </div>
    <div class="result-bar" id="resultBar" style="display:none"></div>
  </div>

</div>

<div id="toast"></div>

<script>
'use strict';

/* ── Constants ─────────────────────────────────────────── */
const LH      = 22;   // line height px — MUST match CSS .line { height: 22px }
const OVERSCAN = 25;  // extra rows above/below visible area
const BATCH    = 5;   // files per async tick

/* ── State ─────────────────────────────────────────────── */
let allLines   = [];
let displayed  = [];
let activeFile = null;
let searchTerm = '';
let sevFilter  = '';
let wrapMode   = false;

// virtual-scroll bookkeeping
let vsLines = [];
let vsStart = -1;
let vsEnd   = -1;

/* ── Helpers ───────────────────────────────────────────── */
function getSev(t) {
  if (/\[ERROR\]|\bERROR\b|Exception|FATAL/i.test(t)) return 'ERROR';
  if (/\[WARN\]|\bWARN\b|WARNING/i.test(t))           return 'WARN';
  if (/\[INFO\]|\bINFO\b/i.test(t))                   return 'INFO';
  return '';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlight(text, term) {
  if (!term) return esc(text);
  const re = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi');
  return esc(text).replace(re, m => `<mark>${m}</mark>`);
}

function yieldTick() { return new Promise(r => setTimeout(r, 0)); }

function showToast(msg, ms = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('on'), ms);
}

/* ── File loading ──────────────────────────────────────── */
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  loadFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', e => {
  loadFiles(e.target.files);
  fileInput.value = '';
});

// Ctrl+V paste support
document.addEventListener('paste', e => {
  if (document.activeElement === document.getElementById('search')) return;
  const files = [...(e.clipboardData?.items || [])]
    .filter(i => i.kind === 'file').map(i => i.getAsFile()).filter(Boolean);
  if (!files.length) return;
  showToast(`📋 ${files.length} archivo${files.length > 1 ? 's' : ''} pegado${files.length > 1 ? 's' : ''} — cargando...`);
  loadFiles(files);
});

async function loadFiles(fileList) {
  if (!fileList.length) return;

  allLines   = [];
  activeFile = null;
  displayed  = [];

  // reset UI
  showProgress(true, 0, 'Preparando...');
  document.getElementById('statsBar').style.display    = 'none';
  document.getElementById('fileTabs').style.display    = 'none';
  document.getElementById('resultBar').style.display   = 'none';
  closeDetail();
  setEmpty('Cargando archivos...');

  const arr = Array.from(fileList);

  for (let i = 0; i < arr.length; i += BATCH) {
    const pct = Math.round(i / arr.length * 100);
    showProgress(true, pct, `Leyendo ${i + 1}–${Math.min(i + BATCH, arr.length)} de ${arr.length}...`);
    await yieldTick();

    const settled = await Promise.allSettled(arr.slice(i, i + BATCH).map(readFile));
    for (const r of settled) {
      if (r.status === 'fulfilled') allLines.push(...r.value);
    }
  }

  showProgress(true, 100, `✓ ${arr.length} archivos · ${allLines.length.toLocaleString()} líneas`);
  setTimeout(() => showProgress(false), 1800);

  updateStats();
  buildFileTabs(arr.map(f => f.name));
  applyFilter();
}

async function readFile(file) {
  try {
    let text;
    if (file.name.endsWith('.gz')) {
      text = pako.inflate(new Uint8Array(await file.arrayBuffer()), { to: 'string' });
    } else {
      text = await file.text();
    }
    return text.split('\n')
      .filter(l => l.trim())
      .map(t => ({ text: t, file: file.name, sev: getSev(t) }));
  } catch (err) {
    console.error('Error leyendo', file.name, err);
    return [{ text: `[ERROR leyendo ${file.name}]: ${err.message}`, file: file.name, sev: 'ERROR' }];
  }
}

/* ── Progress bar ──────────────────────────────────────── */
function showProgress(on, pct = 0, label = '') {
  const wrap = document.getElementById('progressWrap');
  wrap.classList.toggle('on', on);
  document.getElementById('progressLabel').textContent = label;
  document.getElementById('progressFill').style.width  = pct + '%';
}

/* ── Stats ─────────────────────────────────────────────── */
function updateStats() {
  document.getElementById('sFiles').textContent  = new Set(allLines.map(l => l.file)).size.toLocaleString();
  document.getElementById('sLines').textContent  = allLines.length.toLocaleString();
  document.getElementById('sErrors').textContent = allLines.filter(l => l.sev === 'ERROR').length.toLocaleString();
  document.getElementById('sWarns').textContent  = allLines.filter(l => l.sev === 'WARN').length.toLocaleString();
  document.getElementById('statsBar').style.display = 'flex';
}

/* ── File tabs ─────────────────────────────────────────── */
function buildFileTabs(names) {
  const wrap = document.getElementById('fileTabs');
  wrap.innerHTML = '';

  const allTab = mkTab('📋 Todos', 'ftab all-tab on', () => {
    activeFile = null;
    wrap.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
    allTab.classList.add('on');
    applyFilter();
  });
  wrap.appendChild(allTab);

  for (const name of names) {
    const tab = mkTab(name.replace(/\.gz$/, ''), 'ftab', () => {
      activeFile = name;
      wrap.querySelectorAll('.ftab').forEach(t => t.classList.remove('on'));
      tab.classList.add('on');
      applyFilter();
    });
    tab.title = name;
    wrap.appendChild(tab);
  }

  wrap.style.display = 'flex';
}

function mkTab(label, cls, fn) {
  const el = document.createElement('span');
  el.className = cls;
  el.textContent = label;
  el.addEventListener('click', fn);
  return el;
}

/* ── Filter ────────────────────────────────────────────── */
function applyFilter() {
  searchTerm = document.getElementById('search').value.toLowerCase().trim();
  sevFilter  = document.getElementById('sevSel').value;

  displayed = allLines.filter(l => {
    if (activeFile && l.file !== activeFile)                      return false;
    if (sevFilter  && l.sev  !== sevFilter)                       return false;
    if (searchTerm && !l.text.toLowerCase().includes(searchTerm)) return false;
    return true;
  });

  const bar = document.getElementById('resultBar');
  if (displayed.length > 0) {
    bar.style.display = 'block';
    bar.textContent   = `${displayed.length.toLocaleString()} líneas${searchTerm ? ` que contienen "${searchTerm}"` : ''}`;
  } else {
    bar.style.display = 'none';
  }

  if (wrapMode) renderFlat(displayed);
  else          renderVirtual(displayed);
}

function resetFilter() {
  document.getElementById('search').value = '';
  document.getElementById('sevSel').value = '';
  activeFile = null;
  document.querySelectorAll('.ftab').forEach(t => {
    t.classList.remove('on');
    if (t.classList.contains('all-tab')) t.classList.add('on');
  });
  applyFilter();
}

document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyFilter();
});

/* ── Wrap mode ─────────────────────────────────────────── */
function toggleWrap() {
  wrapMode = !wrapMode;
  document.getElementById('btnWrap').classList.toggle('active-btn', wrapMode);
  if (wrapMode) renderFlat(displayed);
  else          renderVirtual(displayed);
}

/* ── Empty state helper ────────────────────────────────── */
function setEmpty(msg) {
  const vp = document.getElementById('viewport');
  vp.onscroll = null;
  vp.classList.remove('vp-wrap');
  vp.innerHTML = `<div class="empty-state"><div class="empty-icon">📂</div><span>${msg}</span></div>`;
  vsStart = vsEnd = -1;
}

/* ── Virtual scroll ────────────────────────────────────── */
function renderVirtual(lines) {
  const vp = document.getElementById('viewport');
  vp.onscroll = null;
  vp.classList.remove('vp-wrap');
  vsLines = lines;
  vsStart = vsEnd = -1;

  if (!lines.length) {
    setEmpty(allLines.length ? 'Sin resultados para este filtro.' : 'Carga tus archivos de log para comenzar.');
    return;
  }

  // Rebuild scroll structure
  vp.innerHTML = '';
  const top  = Object.assign(document.createElement('div'), { id: 'vTop'  });
  const pool = Object.assign(document.createElement('div'), { id: 'vPool' });
  const bot  = Object.assign(document.createElement('div'), { id: 'vBot'  });
  vp.appendChild(top);
  vp.appendChild(pool);
  vp.appendChild(bot);

  // Two rAF frames: first lets the browser assign clientHeight, second paints
  requestAnimationFrame(() => requestAnimationFrame(() => {
    vp.onscroll = vsOnScroll;
    vsUpdate(vp, top, pool, bot, lines);
  }));
}

function vsOnScroll(e) {
  const vp   = e.currentTarget;
  const top  = document.getElementById('vTop');
  const pool = document.getElementById('vPool');
  const bot  = document.getElementById('vBot');
  if (top && pool && bot) vsUpdate(vp, top, pool, bot, vsLines);
}

function vsUpdate(vp, top, pool, bot, lines) {
  const total  = lines.length;
  const scroll = vp.scrollTop;
  const vh     = vp.clientHeight || 560;

  const start = Math.max(0,         Math.floor(scroll / LH) - OVERSCAN);
  const end   = Math.min(total - 1, Math.ceil((scroll + vh) / LH) + OVERSCAN);

  if (start === vsStart && end === vsEnd) return;
  vsStart = start;
  vsEnd   = end;

  top.style.height = (start * LH) + 'px';
  bot.style.height = Math.max(0, (total - end - 1) * LH) + 'px';

  pool.innerHTML = '';
  for (let i = start; i <= end; i++) {
    pool.appendChild(mkLine(lines[i], i));
  }
}

/* ── Flat render (wrap mode) ───────────────────────────── */
function renderFlat(lines) {
  const vp  = document.getElementById('viewport');
  const MAX = 3000;
  vp.onscroll = null;
  vp.innerHTML = '';
  vp.classList.add('vp-wrap');

  if (!lines.length) {
    setEmpty(allLines.length ? 'Sin resultados para este filtro.' : 'Carga tus archivos de log para comenzar.');
    return;
  }

  if (lines.length > MAX) {
    const note = document.createElement('div');
    note.style.cssText = 'padding:6px 10px;font-size:11px;color:var(--muted)';
    note.textContent = `Mostrando ${MAX.toLocaleString()} de ${lines.length.toLocaleString()} líneas. Desactiva "Ajustar texto" para ver todas.`;
    vp.appendChild(note);
  }

  const frag  = document.createDocumentFragment();
  const count = Math.min(lines.length, MAX);
  for (let i = 0; i < count; i++) {
    const el = mkLine(lines[i], i);
    el.style.height = 'auto';
    frag.appendChild(el);
  }
  vp.appendChild(frag);
}

/* ── Build a line element ──────────────────────────────── */
function mkLine(obj, idx) {
  const el = document.createElement('div');
  el.className = 'line' + (obj.sev ? ' sev-' + obj.sev : '');
  el.style.height = LH + 'px';
  el.addEventListener('click', () => showDetail(obj));

  const num = document.createElement('span');
  num.className = 'line-num';
  num.textContent = (idx + 1).toLocaleString();

  const file = document.createElement('span');
  file.className = 'line-file';
  file.textContent = obj.file.replace(/\.gz$/, '');
  file.title = obj.file;

  const txt = document.createElement('span');
  txt.className = 'line-text';
  txt.innerHTML = highlight(obj.text, searchTerm);

  el.appendChild(num);
  el.appendChild(file);
  el.appendChild(txt);
  return el;
}

/* ── Detail panel ──────────────────────────────────────── */
function showDetail(obj) {
  document.getElementById('detailFile').textContent = obj.file;
  document.getElementById('detailBody').textContent = obj.text;
  document.getElementById('detailPanel').classList.add('on');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('on');
}

function copyDetail() {
  navigator.clipboard.writeText(document.getElementById('detailBody').textContent).then(() => {
    const btn = document.getElementById('detailCopyBtn');
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar', 1500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
});

/* ── Export ────────────────────────────────────────────── */
function exportResults() {
  if (!displayed.length) { showToast('⚠ No hay líneas para exportar'); return; }
  const blob = new Blob([displayed.map(l => `[${l.file}] ${l.text}`).join('\n')], { type: 'text/plain' });
  Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `logs-filtrados-${Date.now()}.txt`
  }).click();
  showToast(`✓ Exportadas ${displayed.length.toLocaleString()} líneas`);
}
</script>
